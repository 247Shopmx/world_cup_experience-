name: World Cup Telegram Bot

on:
  schedule:
    # 11:00 - 12:45 CST -> 17:00 - 18:45 UTC
    - cron: "0-59 17 * * *"
    - cron: "0-45 18 * * *"
    # 15:00 - 16:45 CST -> 21:00 - 22:45 UTC
    - cron: "0-59 21 * * *"
    - cron: "0-45 22 * * *"
    # 19:00 - 21:00 CST -> 01:00 - 03:00 UTC (Día siguiente)
    - cron: "0-59 1 * * *"
    - cron: "0-59 2 * * *"
    - cron: "0 3 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear state.json si no existe
        run: |
          if [ ! -f state.json ]; then
            echo '{"fixtures":{},"events":{}}' > state.json
          fi

      - name: Ejecutar Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Guardar state.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Actualizar estado del bot"
          git push
